<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a0f00">
<title>The Meadery — Offline</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0800;color:#f0ddb0;font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
  .wrap{max-width:340px}
  .logo{font-size:52px;margin-bottom:16px}
  h1{font-size:22px;color:#e8b84b;margin-bottom:10px;letter-spacing:0.06em}
  p{font-size:15px;color:#9c835a;line-height:1.7;margin-bottom:20px}
  .btn{display:inline-block;background:linear-gradient(135deg,#7a5518,#2f1e00);border:1px solid rgba(201,146,42,0.4);color:#e8b84b;padding:12px 28px;border-radius:10px;font-size:15px;cursor:pointer;text-decoration:none;letter-spacing:0.05em}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">🍯</div>
  <h1>You're Offline</h1>
  <p>The Meadery needs a connection to load for the first time. Once you've opened it online, it works fully offline.</p>
  <a class="btn" onclick="window.location.reload()">Try Again</a>
</div>
</body>
</html>
